# Feedback XP Discord bot — Render Blueprint
# Deploy: Dashboard → New → Blueprint → Connect repo → Apply
# Hoặc: New → Background Worker → Docker → chọn repo

services:
  - type: worker
    name: feedback-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: singapore
    disk:
      name: feedback-bot-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: TOKEN
        sync: false
      - key: GUILD_ID
        sync: false
      - key: ADMIN_USER_IDS
        sync: false
      - key: STORAGE
        value: sqlite
      - key: DATA_DIR
        value: /app/data
      - key: DATABASE_PATH
        value: /app/data/bot.db
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: XP_COOLDOWN_MINUTES
        value: "5"
      - key: DAILY_XP_CAP
        value: "50"
      - key: SCHEDULER_INTERVAL_MS
        value: "3600000"
      - key: XP_LOG_MAX_ENTRIES
        value: "2000"
      - key: MENTION_AI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MENTION_AI_MODEL
        value: openai/gpt-4o-mini
      - key: MENTION_MAX_INPUT
        value: "300"
      - key: MENTION_AI_COOLDOWN_MS
        value: "10000"
      - key: OPENROUTER_APP_NAME
        value: feedback-bot
